name: Chaturanga CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    
    - name: Compile Project
      run: ./gradlew build -x test
      
    - name: Run Engine Perft Assertions (104 Tests)
      run: |
        ./gradlew :engine-core:compileTestJava
        java -cp engine-core/build/classes/java/main:engine-core/build/classes/java/test io.chaturanga.engine.EngineCoreTest
